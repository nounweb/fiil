<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>실시간 지도 — FIIL.kr</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --primary:#003087;--primary-dk:#001f5e;--primary-bg:#e8eef8;
  --primary-mid:#1351a8;
  --green:#00703c;--green-bg:#e6f4ed;
  --orange:#b45309;--orange-bg:#fef3c7;
  --red:#9b1c1c;--red-bg:#fde8e8;
  --surface:#fff;--bg:#f4f6fa;--sidebar:#003087;
  --border:#c0cde0;--border-dk:#8fa3be;
  --text:#1a1a2e;--sub:#4a5568;--hint:#8795a8;
  --shadow-1:0 1px 3px rgba(0,48,135,.12),0 1px 6px rgba(0,48,135,.08);
  --r:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);background:var(--bg)}
a{text-decoration:none;color:inherit}
.sidebar{width:240px;background:var(--primary);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.sb-brand{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.sb-name{font-size:15px;font-weight:700}.sb-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.sb-nav{padding:8px 0;flex:1}
.sb-section{padding:16px 20px 6px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:rgba(255,255,255,.12);color:#fff;font-weight:700;border-left-color:rgba(255,255,255,.7)}
.sb-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.main{margin-left:240px;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:2px solid var(--primary);height:52px;display:flex;align-items:center;padding:0 28px;gap:12px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);flex:1}
.bc-sep{color:var(--hint)}
.topbar-right{display:flex;align-items:center;gap:16px}
.sys-ok{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--green)}
.sys-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.clock{font-size:13px;font-weight:600;color:var(--sub)}
.content{padding:24px}
.card{background:var(--surface);border:1px solid var(--border);margin-bottom:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--border);background:var(--primary-bg)}
.card-title{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px}
.card-body{padding:18px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-1)}
.stat-val{font-size:24px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:12px;color:var(--sub)}
.stat-sub{font-size:12px;font-weight:600;margin-top:4px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.chip-green{background:var(--green-bg);color:var(--green)}
.chip-approved{background:#166534;color:#fff;font-weight:700}
.chip-blue{background:var(--primary-bg);color:var(--primary)}
.chip-orange{background:var(--orange-bg);color:var(--orange)}
.chip-red{background:var(--red-bg);color:var(--red)}
.chip-gray{background:#f1f3f4;color:var(--sub)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:4px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dk)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--primary);background:var(--primary-bg);border-bottom:1px solid var(--border)}
.tbl td{padding:9px 14px;border-bottom:1px solid #edf0f5;font-size:12px}
.tbl tbody tr:hover{background:var(--bg)}
.tbl .amt{text-align:right;font-variant-numeric:tabular-nums}
.rpt-id{color:var(--primary);font-weight:700}
.rpt-id:hover{text-decoration:underline}
.loading{text-align:center;padding:60px;color:var(--hint)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--hint);font-size:13px}
</style>
</head>
<body>
<div class="sidebar"><a class="sb-brand" href="dashboard.html"><div class="sb-icon">F</div><div><div class="sb-name">FIIL.kr</div><div class="sb-sub">관리자 대시보드</div></div></a><nav class="sb-nav"><div class="sb-section">운영 현황</div><a class="sb-item" href="dashboard.html"><span>📊</span> 종합 대시보드</a><a class="sb-item" href="dashboard.html#reports"><span>📋</span> 신고 현황</a><a class="sb-item active" href="map.html"><span>🗺</span> 실시간 지도</a><a class="sb-item" href="dispatch.html"><span>🚗</span> 출동 현황</a><div class="sb-section">분석 · 보고</div><a class="sb-item" href="stats.html"><span>📈</span> 통계 분석</a><a class="sb-item" href="budget.html"><span>💰</span> 예산 · 비용</a><a class="sb-item" href="results.html"><span>📄</span> 조치 결과 보고서</a><a class="sb-item" href="openhash.html"><span>⛓</span> 오픈해시 기록</a><div class="sb-section">관리</div><a class="sb-item" href="resources.html"><span>👥</span> 인력 · 장비</a><a class="sb-item" href="settings.html"><span>⚙️</span> 시스템 설정</a></nav></div>
<div class="main">
<div class="topbar">
  <div class="breadcrumb"><a href="dashboard.html">FIIL.kr</a><span class="bc-sep">›</span><span>실시간 지도</span></div>
  <div class="topbar-right"><div class="sys-ok"><div class="sys-dot"></div>시스템 정상</div><div class="clock" id="clock">—</div></div>
</div>
<div class="content">

<div class="stat-grid">
  <div class="stat-card"><div style="font-size:20px;margin-bottom:8px">📍</div><div class="stat-val" id="m-total">—</div><div class="stat-lbl">전체 신고</div></div>
  <div class="stat-card"><div style="font-size:20px;margin-bottom:8px">🚨</div><div class="stat-val" id="m-urgent">—</div><div class="stat-lbl">긴급 신고</div></div>
  <div class="stat-card"><div style="font-size:20px;margin-bottom:8px">📍</div><div class="stat-val" id="m-gps">—</div><div class="stat-lbl">GPS 수신 건</div></div>
  <div class="stat-card"><div style="font-size:20px;margin-bottom:8px">🗺</div><div class="stat-val" id="m-area">제주</div><div class="stat-lbl">서비스 지역</div></div>
</div>
<div class="card">
  <div class="card-head"><div class="card-title">🗺 실시간 신고 위치</div><span style="font-size:11px;color:var(--sub)">GPS 좌표 기반 · 카카오맵</span></div>
  <div class="card-body" style="padding:0">
    <div id="map" style="width:100%;height:520px;border-radius:0 0 8px 8px;background:#e8f0fa;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center;color:var(--sub)">
        <div style="font-size:40px;margin-bottom:12px">🗺</div>
        <div style="font-weight:700;margin-bottom:6px">카카오맵 로딩 중…</div>
        <div style="font-size:12px">신고 위치를 지도에 표시합니다</div>
      </div>
    </div>
  </div>
</div>
<div class="card">
  <div class="card-head"><div class="card-title">📋 신고 위치 목록</div></div>
  <div class="card-body" style="padding:0">
    <div id="map-list" class="loading"><div class="spinner"></div><br>불러오는 중…</div>
  </div>
</div>
</div>
</div>
<script>
const SB_URL='https://ebbecjfrwaswbdybbgiu.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViYmVjamZyd2Fzd2JkeWJiZ2l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjE5ODQsImV4cCI6MjA5NTEzNzk4NH0.H2ahQKtWdSke04Pdi3hDY86pdTx7UUKPUpQMlS_zciA';
setInterval(()=>{const e=document.getElementById('clock');if(e)e.textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
async function sbGet(path){const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});if(!r.ok)throw new Error(r.status);return r.json();}
async function sbPatch(path,body){return fetch(SB_URL+'/rest/v1/'+path,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});}
function fmt(n){return n?Math.round(n).toLocaleString():'0';}
function fmtDate(s){return s?new Date(s).toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}):'—';}
function urgClass(u){return {긴급:'chip-red',높음:'chip-orange',보통:'chip-blue',낮음:'chip-gray'}[u]||'chip-gray';}
function statClass(s){return {완료:'chip-green',승인:'chip-approved',출동중:'chip-blue',대기중:'chip-orange',접수:'chip-gray'}[s]||'chip-gray';}
function typeIcon(t){t=t||'';return t.includes('해안')||t.includes('해양')?'🏖️':t.includes('불법')?'🗑️':t.includes('응급')?'🚨':t.includes('도로')?'🚧':t.includes('산불')?'🔥':t.includes('식당')?'🍽️':t.includes('수질')?'💧':'📋';}

async function loadMap(){
  const rows = await sbGet('reports?select=id,type,location,gps,urgency,status,reported_at&order=reported_at.desc&limit=100').catch(()=>[]);
  document.getElementById('m-total').textContent = rows.length+'건';
  document.getElementById('m-urgent').textContent = rows.filter(r=>r.urgency==='긴급').length+'건';
  const gpsRows = rows.filter(r=>r.gps);
  document.getElementById('m-gps').textContent = gpsRows.length+'건';

  // 카카오맵 초기화
  const mapDiv = document.getElementById('map');
  if(window.kakao && kakao.maps){
    kakao.maps.load(()=>{
      const map = new kakao.maps.Map(mapDiv,{center:new kakao.maps.LatLng(33.4996,126.5312),level:10});
      gpsRows.forEach(r=>{
        const parts = r.gps.replace(/\s/g,'').split(',');
        if(parts.length<2) return;
        const pos = new kakao.maps.LatLng(parseFloat(parts[0]),parseFloat(parts[1]));
        const color = r.urgency==='긴급'?'#d93025':r.urgency==='높음'?'#e37400':r.urgency==='보통'?'#0057A8':'#5f6368';
        const marker = new kakao.maps.Marker({map,position:pos});
        const iw = new kakao.maps.InfoWindow({content:`<div style="padding:6px 10px;font-size:12px;font-weight:700">${r.id}<br><span style="color:${color}">${r.urgency||'보통'}</span> · ${r.type||'—'}</div>`});
        kakao.maps.event.addListener(marker,'click',()=>iw.open(map,marker));
      });
    });
  } else {
    mapDiv.innerHTML = `<div style="text-align:center;color:var(--sub);padding:40px">
      <div style="font-size:36px;margin-bottom:12px">🗺</div>
      <b>GPS 신고 ${gpsRows.length}건</b> 등록됨<br>
      <span style="font-size:12px;margin-top:8px;display:block">카카오맵 SDK 로드 후 마커가 표시됩니다</span>
      <div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
        ${gpsRows.slice(0,8).map(r=>`<span class="chip chip-blue">${r.id}</span>`).join('')}
      </div></div>`;
  }

  // 목록
  const el = document.getElementById('map-list');
  if(!rows.length){el.innerHTML='<div class="empty">신고 데이터 없음</div>';return;}
  el.innerHTML = `<table class="tbl">
    <thead><tr><th>신고번호</th><th>유형</th><th>위치</th><th>GPS</th><th>긴급도</th><th>상태</th><th>신고 일시</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td><a class="rpt-id" href="report.html?id=${r.id}">${r.id}</a></td>
      <td>${typeIcon(r.type)} ${r.type||'—'}</td>
      <td class="loc-cell" data-gps="${r.gps||''}">${r.location&&r.location!=='위치 미상'?r.location:(r.gps||'—')}</td>
      <td style="font-size:11px;color:var(--sub)">${r.gps||'—'}</td>
      <td><span class="chip ${urgClass(r.urgency)}">${r.urgency||'—'}</span></td>
      <td><span class="chip ${statClass(r.status)}">${r.status||'접수'}</span></td>
      <td style="font-size:11px">${fmtDate(r.reported_at)}</td>
    </tr>`).join('')}</tbody></table>`;

  // 역지오코딩
  document.querySelectorAll('.loc-cell[data-gps]').forEach(cell=>{
    const gps=cell.dataset.gps;
    if(!gps||cell.textContent!==gps) return;
    const p=gps.replace(/\s/g,'').split(',');
    if(p.length<2) return;
    fetch(`https://dapi.kakao.com/v2/local/geo/coord2address.json?x=${p[1]}&y=${p[0]}&input_coord=WGS84`,
      {headers:{'Authorization':'KakaoAK 66648ca49f126d8752b33d542789ac56'}})
    .then(r=>r.json()).then(d=>{const a=d.documents?.[0]?.address?.address_name;if(a)cell.textContent=a;}).catch(()=>{});
  });
}
loadMap();

</script>
</body>
</html>
