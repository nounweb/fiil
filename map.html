<title>실시간 지도 — FIIL.kr</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --primary:    #305890;
  --primary-dk: #102040;
  --primary-bg: #eaf2fa;
  --primary-mid:#4a72a8;
  --primary-800:#1a3560;
  --primary-700:#214176;
  --primary-300:#7a9cc8;
  --primary-200:#b0c8e0;
  --primary-100:#d0e0f0;
  --orange:     #b45309;
  --orange-bg:  #fef3c7;
  --red:        #9b1c1c;
  --red-bg:     #fde8e8;
  --surface:    #f8f9fc;
  --bg:         #f8f9fc;
  --border:     #b0c8e0;
  --text:       #1a2535;
  --sub:        #4a5e78;
  --hint:       #8a9bb0;
  --shadow-1:   0 1px 3px rgba(48,88,144,.12),0 1px 6px rgba(48,88,144,.06);
  --r: 4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.sidebar{width:240px;background:var(--primary);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.sb-brand{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.08);transition:background .15s}
.sb-brand:hover{background:rgba(255,255,255,.04)}
.sb-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.sb-name{font-size:15px;font-weight:700}
.sb-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.sb-nav{padding:8px 0;flex:1}
.sb-section{padding:16px 20px 6px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;transition:background .15s,color .15s;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:rgba(255,255,255,.12);color:#fff;font-weight:700;border-left-color:rgba(255,255,255,.7)}
.sb-badge{margin-left:auto;background:rgba(255,255,255,.15);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.main{margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:2px solid var(--primary);height:52px;display:flex;align-items:center;padding:0 24px;gap:12px;box-shadow:var(--shadow-1)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);flex:1}
.breadcrumb a{color:var(--sub)}
.breadcrumb a:hover{color:var(--primary)}
.bc-sep{color:var(--hint)}
.topbar-right{display:flex;align-items:center;gap:16px}
.sys-ok{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--primary)}
.sys-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.clock{font-size:13px;font-weight:600;color:var(--sub)}
.content{padding:24px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--primary);padding:16px 18px}
.stat-icon{margin-bottom:8px;color:var(--primary)}
.stat-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--primary)}
.stat-lbl{font-size:12px;color:var(--sub)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-1);margin-bottom:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--border);background:var(--primary-bg)}
.card-title{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px}
.card-sub{font-size:11px;color:var(--sub)}
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:2px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.2px}
.chip-green  {background:var(--primary-bg);color:var(--primary)}
.chip-approved{background:#214176;color:#fff}
.chip-blue   {background:var(--primary-bg);color:var(--primary)}
.chip-orange {background:var(--orange-bg);color:#b45309}
.chip-red    {background:var(--red-bg);color:var(--red)}
.chip-gray   {background:#eaf2fa;color:var(--sub)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);border-bottom:2px solid var(--border);background:var(--bg);white-space:nowrap}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f0f5fb}
.rpt-id{color:var(--primary);font-weight:700}
.rpt-id:hover{text-decoration:underline}
.rpt-cards{display:none;flex-direction:column}
.rpt-card{display:block;padding:14px 16px;border-bottom:1px solid var(--border);color:inherit}
.rpt-card:last-child{border-bottom:none}
.rpt-card:active{background:var(--primary-bg)}
.rpt-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rpt-card-id{color:var(--primary);font-size:13px;font-weight:700}
.rpt-card-chips{display:flex;gap:4px;flex-wrap:wrap}
.rpt-card-loc{font-size:13px;color:var(--text);font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rpt-card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.rpt-card-type{font-size:11px;color:var(--hint)}
.rpt-card-date{font-size:11px;color:var(--hint)}
.loading{text-align:center;padding:60px;color:var(--hint)}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--hint);font-size:12px}
#kakao-map{width:100%;height:500px}
.hamburger{display:none}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300}
@media(max-width:1100px){.stat-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;width:280px;z-index:400}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0}
  .topbar{padding:0 14px;height:48px}
  .topbar-right .sys-ok span:last-child{display:none}
  .hamburger{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:none;border:none;cursor:pointer;margin-right:8px;color:var(--primary);flex-shrink:0}
  .content{padding:12px}
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat-card{padding:12px 14px}
  .stat-val{font-size:18px}
  .stat-lbl{font-size:11px}
  #kakao-map{height:320px}
  .tbl-wrap{display:none}
  .rpt-cards{display:flex}
  .card-head{padding:10px 14px}
}
@media(max-width:400px){
  .stat-grid{grid-template-columns:1fr 1fr;gap:8px}
  .stat-val{font-size:16px}
  .content{padding:10px}
}
</style>

<script>
const SB_URL='https://ebbecjfrwaswbdybbgiu.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViYmVjamZyd2Fzd2JkeWJiZ2l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjE5ODQsImV4cCI6MjA5NTEzNzk4NH0.H2ahQKtWdSke04Pdi3hDY86pdTx7UUKPUpQMlS_zciA';

setInterval(()=>{const e=document.getElementById('clock');if(e)e.textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);

async function sbGet(path){const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});if(!r.ok)throw new Error(r.status);return r.json();}

function fmtDate(s){if(!s)return'—';const d=new Date(s);return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtDateFull(s){if(!s)return'—';return new Date(s).toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}
function urgClass(u){return{긴급:'chip-red',높음:'chip-orange',보통:'chip-blue',낮음:'chip-gray'}[u]||'chip-gray';}
function statClass(s){return{완료:'chip-green',승인:'chip-approved',출동중:'chip-blue',대기중:'chip-orange',접수:'chip-gray'}[s]||'chip-gray';}

async function loadMap(){
  const rows=await sbGet('reports?select=id,type,location,gps,urgency,status,reported_at&order=reported_at.desc&limit=100').catch(()=>[]);
  document.getElementById('m-total').textContent=rows.length+'건';
  document.getElementById('m-urgent').textContent=rows.filter(r=>r.urgency==='긴급').length+'건';
  const gpsRows=rows.filter(r=>r.gps);
  document.getElementById('m-gps').textContent=gpsRows.length+'건';
  document.getElementById('sb-badge').textContent=rows.length;

  const mapDiv=document.getElementById('kakao-map');
  kakao.maps.load(function(){
    const map=new kakao.maps.Map(mapDiv,{center:new kakao.maps.LatLng(33.4996,126.5312),level:10});
    gpsRows.forEach(r=>{
      const parts=r.gps.replace(/\s/g,'').split(',');
      if(parts.length<2)return;
      const pos=new kakao.maps.LatLng(parseFloat(parts[0]),parseFloat(parts[1]));
      const color=r.urgency==='긴급'?'#9b1c1c':r.urgency==='높음'?'#b45309':'#305890';
      const marker=new kakao.maps.Marker({map,position:pos});
      const iw=new kakao.maps.InfoWindow({content:`<div style="padding:8px 12px;font-size:12px;font-weight:700"><div style="color:#305890;margin-bottom:2px">${r.id}</div><div style="color:${color};font-size:11px">${r.urgency||'보통'} · ${r.type||'—'}</div></div>`});
      kakao.maps.event.addListener(marker,'click',()=>iw.open(map,marker));
    });
  });

  const state=document.getElementById('map-list-state');
  if(!rows.length){state.className='empty';state.innerHTML='신고 데이터 없음';return;}
  state.style.display='none';
  document.getElementById('list-count').textContent=rows.length+'건';

  document.getElementById('tbl-body').innerHTML=rows.map(r=>`
    <tr>
      <td><a class="rpt-id" href="report.html?id=${r.id}">${r.id}</a></td>
      <td style="font-size:12px;color:var(--sub)">${r.type||'—'}</td>
      <td class="loc-cell" data-gps="${r.gps||''}" style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.location&&r.location!=='위치 미상'?r.location:(r.gps||'—')}</td>
      <td style="font-size:11px;color:var(--hint)">${r.gps||'—'}</td>
      <td><span class="chip ${urgClass(r.urgency)}">${r.urgency||'—'}</span></td>
      <td><span class="chip ${statClass(r.status)}">${r.status||'접수'}</span></td>
      <td style="font-size:11px;color:var(--sub);white-space:nowrap">${fmtDateFull(r.reported_at)}</td>
    </tr>`).join('');

  document.getElementById('rpt-cards').innerHTML=rows.map(r=>`
    <a class="rpt-card" href="report.html?id=${r.id}">
      <div class="rpt-card-top">
        <span class="rpt-card-id">${r.id}</span>
        <div class="rpt-card-chips">
          <span class="chip ${urgClass(r.urgency)}">${r.urgency||'—'}</span>
          <span class="chip ${statClass(r.status)}">${r.status||'접수'}</span>
        </div>
      </div>
      <div class="rpt-card-loc loc-cell" data-gps="${r.gps||''}">${r.location&&r.location!=='위치 미상'?r.location:(r.gps||'위치 미상')}</div>
      <div class="rpt-card-meta">
        <span class="rpt-card-type">${r.type||'유형 미상'}</span>
        <span style="color:var(--hint);font-size:11px">·</span>
        <span class="rpt-card-date">${fmtDate(r.reported_at)}</span>
      </div>
    </a>`).join('');

  document.querySelectorAll('.loc-cell[data-gps]').forEach(cell=>{
    const gps=cell.dataset.gps;
    if(!gps)return;
    const p=gps.replace(/\s/g,'').split(',');
    if(p.length<2)return;
    (function(lat,lng,cell){
      if(!window.kakao||!kakao.maps||!kakao.maps.services)return;
      new kakao.maps.services.Geocoder().coord2Address(lng,lat,(result,status)=>{
        if(status===kakao.maps.services.Status.OK&&result[0]){
          const a=result[0].road_address?.address_name||result[0].address?.address_name;
          if(a)cell.textContent=a;
        }
      });
    })(p[0],p[1],cell);
  });
}

kakao.maps.load(loadMap);

function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('sidebar-overlay');
  if(!sb)return;
  sb.classList.toggle('open');
  ov&&ov.classList.toggle('show');
}
function closeSidebar(){
  document.querySelector('.sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('show');
}
document.querySelectorAll('.sb-item').forEach(i=>i.addEventListener('click',()=>{if(window.innerWidth<=768)closeSidebar();}));
</script>
</body>
</html>
