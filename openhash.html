<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>오픈해시 기록 — FIIL.kr</title>
<style>

@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendardvariable.css');

/* ── Design tokens (Supabase light) ── */
:root{
  --bg:        #fff;
  --bg-subtle: #f8f9fa;
  --bg-hover:  #f1f3f5;
  --bg-sel:    #e8f4fd;
  --border:    #e5e7eb;
  --border2:   #d1d5db;
  --text:      #171717;
  --text2:     #6b7280;
  --text3:     #9ca3af;
  --accent:    #3ecf8e;
  --accent-d:  #29b978;
  --blue:      #3b82f6;
  --red:       #ef4444;
  --orange:    #f59e0b;
  --sb-w:      224px;
  --sb-rail:   48px;
  --top-h:     48px;
  --font:      'Pretendard Variable','Pretendard',system-ui,sans-serif;
  /* legacy aliases for content that still uses old vars */
  --primary:   #3ecf8e;
  --primary-dk:#29b978;
  --primary-bg:#f0fdf9;
  --surface:   #f8f9fa;
  --hint:      #9ca3af;
  --sub:       #6b7280;
  --r:         4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg-subtle);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sb-rail);
  flex-shrink:0;
  background:var(--bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .18s ease;
  z-index:200;
  position:fixed;top:0;left:0;bottom:0;
}
.sidebar:hover{width:var(--sb-w)}
.sb-brand{
  padding:0 13px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  height:var(--top-h);overflow:hidden;flex-shrink:0;
  text-decoration:none;color:inherit;
}
.sb-icon{
  width:22px;height:22px;flex-shrink:0;
  background:var(--accent);border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
}
.sb-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;opacity:0;transition:opacity .12s .04s}
.sidebar:hover .sb-name{opacity:1}
.sb-sub{font-size:10px;color:var(--text2);white-space:nowrap}
.sb-nav{padding:6px;flex:1;overflow-y:auto;overflow-x:hidden}
.sb-section{
  padding:10px 10px 4px;
  font-size:10px;font-weight:600;letter-spacing:.6px;
  text-transform:uppercase;color:var(--text3);
  white-space:nowrap;opacity:0;transition:opacity .1s;
}
.sidebar:hover .sb-section{opacity:1}
.sb-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;border-radius:5px;
  font-size:12px;color:var(--text2);
  cursor:pointer;transition:background .1s,color .1s;
  white-space:nowrap;overflow:hidden;
  text-decoration:none;
}
.sb-item:hover{background:var(--bg-hover);color:var(--text)}
.sb-item.active{background:var(--bg-hover);color:var(--text);font-weight:500}
.sb-item svg{flex-shrink:0;opacity:.65}
.sb-item.active svg{opacity:1}
.sb-label{white-space:nowrap;opacity:0;transition:opacity .1s .04s}
.sidebar:hover .sb-label{opacity:1}
.sb-badge{
  margin-left:auto;
  background:#f3f4f6;color:var(--text2);
  font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;
  border:1px solid var(--border);
  opacity:0;transition:opacity .1s;
}
.sidebar:hover .sb-badge{opacity:1}

/* ── MAIN ── */
.main{margin-left:var(--sb-rail);min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{
  height:var(--top-h);flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:10px;
  position:sticky;top:0;z-index:100;
}
.hamburger{
  display:none;padding:4px;border-radius:4px;color:var(--text2);
  cursor:pointer;
}
.hamburger:hover{background:var(--bg-hover)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);flex:1}
.breadcrumb a:hover{color:var(--text)}
.bc-sep{color:var(--text3)}
.bc-cur{color:var(--text);font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px}
.sys-ok,.sys-pill{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--text2);
  padding:3px 8px;border-radius:12px;
  border:1px solid var(--border);background:var(--bg);
}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums}

/* ── CONTENT ── */
.content,.wrap{padding:20px;flex:1}

/* ── CARDS ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:14px}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;border-bottom:1px solid var(--border);
}
.card-title{font-size:11px;font-weight:600;color:var(--text);letter-spacing:.3px}
.card-body{padding:16px}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:16px 18px;
}
.stat-val{font-size:16px;font-weight:600;line-height:1;margin-bottom:4px;color:var(--text)}
.stat-lbl{font-size:12px;color:var(--text2)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:16px 18px;border-top:3px solid var(--accent);
}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:8px;font-weight:500}
.kpi-value{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* ── ROW LAYOUTS ── */
.row-2,.panel-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.row-equal{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid-5-7{display:grid;grid-template-columns:5fr 7fr;gap:14px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}

/* ── TOOLBAR ── */
.toolbar{
  height:40px;flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:8px;
}
.search-wrap{
  flex:1;max-width:300px;
  display:flex;align-items:center;gap:6px;
  background:var(--bg-subtle);border:1px solid var(--border);
  border-radius:4px;padding:0 8px;height:28px;
}
.search-wrap input{border:none;background:none;font-size:12px;color:var(--text);outline:none;width:100%}
.search-wrap input::placeholder{color:var(--text3)}

/* ── BUTTONS ── */
.btn,.tb-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:4px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:var(--bg);color:var(--text2);
  transition:background .1s,border-color .1s;cursor:pointer;
  font-family:var(--font);
}
.btn:hover,.tb-btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border2)}
.btn-primary,.tb-btn-green{
  background:var(--accent);border-color:var(--accent);color:#fff;
}
.btn-primary:hover,.tb-btn-green:hover{background:var(--accent-d);border-color:var(--accent-d);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg-hover)}

/* ── PERIOD BAR ── */
.period-bar{
  display:flex;align-items:center;gap:0;margin-bottom:16px;
  border:1px solid var(--border);border-radius:4px;overflow:hidden;
  width:fit-content;background:var(--bg);
}
.period-btn{
  padding:6px 16px;font-size:12px;font-weight:500;
  font-family:var(--font);cursor:pointer;
  border:none;border-right:1px solid var(--border);
  background:var(--bg);color:var(--text2);
  transition:background .12s,color .12s;
}
.period-btn:last-child{border-right:none}
.period-btn:hover{background:var(--bg-hover);color:var(--text)}
.period-btn.active{background:var(--accent);color:#fff;font-weight:600}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.chip-green {background:#f0fdf4;color:#16a34a}
.chip-approved{background:#dcfce7;color:#15803d;font-weight:700}
.chip-blue  {background:#eff6ff;color:#2563eb}
.chip-orange{background:#fff7ed;color:#c2410c}
.chip-red   {background:#fef2f2;color:#dc2626}
.chip-gray  {background:#f9fafb;color:var(--text2);border:1px solid var(--border)}
.td-null{color:var(--text3);font-style:italic;font-size:11px}

/* ── TABLES ── */
.tbl,.fs-tbl,.list-tbl,.mat-table{width:100%;border-collapse:collapse}
.tbl th,.fs-tbl th,.list-tbl th,.mat-table th{
  text-align:left;padding:9px 12px;
  font-size:11px;font-weight:600;color:var(--text2);
  background:var(--bg-subtle);border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.tbl td,.fs-tbl td,.list-tbl td,.mat-table td{
  padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)
}
.tbl tbody tr:hover,.fs-tbl tbody tr:hover,.list-tbl tbody tr:hover{background:var(--bg-hover)}
.tbl tfoot td,.list-tbl tfoot td{
  font-weight:600;background:var(--bg-subtle);
  border-top:1px solid var(--border);border-bottom:none;
}
.tbl .amt,.list-tbl .amt,.fs-tbl .amt{text-align:right;font-variant-numeric:tabular-nums}
.rpt-id{color:var(--blue);font-weight:500}
.rpt-id:hover{text-decoration:underline}

/* ── FINANCIAL TABLE ROWS ── */
.r-section td{background:var(--bg-subtle);font-weight:600;font-size:11px;color:var(--text2);letter-spacing:.3px;border-bottom:1px solid var(--border)}
.r-indent td{padding-left:24px}
.r-total td{background:var(--accent);color:#fff;font-weight:600}
.r-total-orange td{background:var(--orange);color:#fff;font-weight:600}
.r-income td{background:#f0fdf4;color:#15803d;font-weight:600}
.r-equity td{background:#f0fdf4;color:#15803d;font-weight:600}
.amt-green{color:#16a34a}
.amt-orange{color:#c2410c}
.insight{
  padding:10px 14px;background:var(--bg-subtle);
  font-size:11px;color:var(--text2);border-top:1px solid var(--border);
}

/* ── SETTINGS / FORM ELEMENTS ── */
.setting-section{margin-bottom:20px}
.setting-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;background:var(--bg)}
.setting-row:hover{background:var(--bg-hover)}
.setting-key{font-size:12px;font-weight:500;color:var(--text)}
.setting-val{font-size:12px;color:var(--text2);font-family:'JetBrains Mono','Courier New',monospace}
input[type=text],input[type=number],select,textarea{
  border:1px solid var(--border);border-radius:4px;padding:6px 10px;
  font-size:12px;color:var(--text);background:var(--bg);outline:none;width:100%;
}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(62,207,142,.15)}
.toggle{
  position:relative;display:inline-block;width:34px;height:18px;flex-shrink:0;
}
.toggle input{opacity:0;width:0;height:0}
.slider{
  position:absolute;cursor:pointer;inset:0;background:var(--border2);
  border-radius:18px;transition:.3s;
}
.slider:before{
  position:absolute;content:'';height:12px;width:12px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s;
}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider:before{transform:translateX(16px)}

/* ── BLOCKCHAIN ── */
.chain{background:#0f172a;border-radius:6px;padding:16px}
.chain-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(62,207,142,.15);border:1px solid rgba(62,207,142,.3);color:#a7f3d0;padding:4px 10px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:12px}
.chain-row{display:flex;gap:10px;margin-bottom:7px;font-size:11px;font-family:'JetBrains Mono','Courier New',monospace}
.chain-row:last-child{margin-bottom:0}
.chain-k{color:#475569;min-width:110px;flex-shrink:0}
.chain-v{color:#94a3b8;word-break:break-all}
.chain-hash{color:var(--accent)}
.chain-ok{color:#a7f3d0}

/* ── REPORT DETAIL ── */
.rh{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:14px}
.rh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.rh-id{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.rh-subtitle{font-size:12px;color:var(--text2);margin-top:3px}
.rh-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding-top:16px;border-top:1px solid var(--border)}
.meta-f{display:flex;flex-direction:column;gap:2px}
.meta-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
.meta-v{font-size:12px;font-weight:500;color:var(--text)}
.photo-box{aspect-ratio:16/10;border-radius:6px;overflow:hidden;background:var(--bg-subtle);border:1px solid var(--border);position:relative;display:flex;align-items:center;justify-content:center}
.photo-box img{width:100%;height:100%;object-fit:cover}
.photo-tag{position:absolute;top:8px;right:8px;background:rgba(62,207,142,.85);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.photo-empty{text-align:center;color:var(--text3);font-size:12px}
.mat-bar{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block}
.mat-fill{height:100%;border-radius:3px;background:var(--accent)}
.disposal-tag{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600}
.d-recycle{background:#f0fdf4;color:#15803d}
.d-landfill{background:var(--bg-subtle);color:var(--text2)}
.d-special{background:#fef2f2;color:#dc2626}
.subtotal-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.subtotal-chip{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.cost-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.cost-row:last-child{border-bottom:none;font-weight:600;font-size:14px}
.cost-lbl{color:var(--text2)}
.cost-sub{font-size:10px;color:var(--text3);display:block;margin-top:1px}
.cost-section{background:var(--bg-subtle);border-radius:6px;padding:12px 14px;margin-bottom:10px}
.cost-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.tl{padding-left:22px;position:relative}
.tl::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-20px;top:1px;width:14px;height:14px;border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px}
.tl-dot.done{background:var(--accent);color:#fff;box-shadow:0 0 0 2px var(--bg)}
.tl-dot.pend{background:var(--border2);box-shadow:0 0 0 2px var(--bg)}
.tl-time{font-size:10px;color:var(--text3);margin-bottom:1px;font-weight:600}
.tl-desc{font-size:12px;color:var(--text);line-height:1.5}
.weather-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.wx-item{background:var(--bg-subtle);border-radius:6px;padding:10px;text-align:center}
.wx-icon{font-size:16px;margin-bottom:4px}
.wx-val{font-size:13px;font-weight:600}
.wx-lbl{font-size:10px;color:var(--text3);margin-top:1px}
.gcs-badge{display:flex;align-items:center;gap:10px;background:var(--bg-subtle);border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:14px}
.gcs-icon{font-size:16px}
.gcs-text strong{display:block;font-size:13px;color:var(--text)}
.gcs-text span{font-size:11px;color:var(--text2)}
.gcs-pts{margin-left:auto;font-size:16px;font-weight:700;color:var(--accent)}

/* ── LOADING / EMPTY ── */
.loading{text-align:center;padding:60px;color:var(--text3)}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--text3);font-size:12px}
.panel-badge{font-size:10px;color:var(--text2);padding:2px 8px;border:1px solid var(--border);background:var(--bg);border-radius:4px}

/* ── MOBILE OVERLAY ── */
.hamburger{display:none}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300}
.sidebar-overlay.show{display:block}

@media(max-width:1100px){
  .stat-grid,.kpi-grid{grid-template-columns:1fr 1fr !important}
  .row-2,.panel-row,.grid-5-7,.row-equal{grid-template-columns:1fr !important}
}
@media(max-width:768px){
  .sidebar{
    transform:translateX(-100%);
    transition:transform .25s ease;
    width:280px;z-index:400;
    /* override hover-expand for mobile */
  }
  .sidebar:hover{width:280px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0 !important}
  .hamburger{
    display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;border-radius:4px;
    color:var(--text2);flex-shrink:0;
  }
  .hamburger:hover{background:var(--bg-hover)}
  .content,.wrap{padding:12px}
  .stat-grid,.kpi-grid{grid-template-columns:1fr 1fr !important;gap:10px;margin-bottom:12px}
  .stat-card,.kpi-card{padding:12px}
  .stat-val,.kpi-value{font-size:14px}
  .row-2,.row-equal,.panel-row,.grid-2,.grid-3,.grid-5-7{grid-template-columns:1fr !important;gap:10px}
  .card{margin-bottom:10px}
  .card-head{padding:9px 12px}
  .tbl th,.tbl td,.list-tbl th,.list-tbl td,.fs-tbl th,.fs-tbl td{font-size:11px;padding:7px 8px;white-space:nowrap}
  .weather-grid{grid-template-columns:1fr 1fr !important}
  .rh-meta{grid-template-columns:1fr 1fr !important}
  .chip{font-size:10px;padding:2px 7px}
  .period-bar{flex-wrap:wrap}
  .topbar{padding:0 10px}
  #mini-map{height:150px !important}
  #kakao-map{height:340px !important}
}
@media(max-width:400px){
  .stat-grid,.kpi-grid{grid-template-columns:1fr 1fr !important;gap:8px}
  .content,.wrap{padding:8px}
}

</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <a href="dashboard.html" class="sb-brand">
    <div class="sb-icon">F</div>
    <div class="sb-name">FIIL.kr<div class="sb-sub" style="font-size:10px;font-weight:400">관리자 대시보드</div></div>
  </a>
  <nav class="sb-nav">

<script>
const SB_URL='https://ebbecjfrwaswbdybbgiu.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViYmVjamZyd2Fzd2JkeWJiZ2l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjE5ODQsImV4cCI6MjA5NTEzNzk4NH0.H2ahQKtWdSke04Pdi3hDY86pdTx7UUKPUpQMlS_zciA';
setInterval(()=>{const e=document.getElementById('clock');if(e)e.textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
async function sbGet(path){const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});if(!r.ok)throw new Error(r.status);return r.json();}
async function sbPatch(path,body){return fetch(SB_URL+'/rest/v1/'+path,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});}
function fmt(n){return n?Math.round(n).toLocaleString():'0';}
function fmtDate(s){return s?new Date(s).toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}):'—';}
function urgClass(u){return {긴급:'chip-red',높음:'chip-orange',보통:'chip-blue',낮음:'chip-gray'}[u]||'chip-gray';}
function statClass(s){return {완료:'chip-green',승인:'chip-approved',출동중:'chip-blue',대기중:'chip-orange',접수:'chip-gray'}[s]||'chip-gray';}
function typeIcon(t){t=t||'';return t.includes('해안')||t.includes('해양')?'':t.includes('불법')?'':t.includes('응급')?'':t.includes('도로')?'':t.includes('산불')?'':t.includes('식당')?'🍽️':t.includes('수질')?'💧':'';}

function sha256sim(str){
  let h=0;
  for(let i=0;i<str.length;i++){h=Math.imul(31,h)+str.charCodeAt(i)|0;}
  const hex=Math.abs(h).toString(16).padStart(8,'0');
  return (hex+hex+hex+hex+hex+hex+hex+hex).slice(0,64);
}
async function loadOpenhash(){
  const rows=await sbGet('reports?select=id,type,location,status,reported_at,analysis&order=reported_at.desc&limit=100').catch(()=>[]);
  document.getElementById('oh-blocks').textContent=rows.length+'개';
  document.getElementById('oh-total').textContent=rows.length+'건';
  const el=document.getElementById('hash-list');
  if(!rows.length){el.innerHTML='<div class="empty">기록 없음</div>';return;}
  el.innerHTML=`<table class="tbl">
    <thead><tr><th>블록 ID</th><th>신고번호</th><th>유형</th><th>상태</th><th>SHA-256 해시</th><th>검증</th><th>등록 일시</th></tr></thead>
    <tbody>${rows.map((r,i)=>{
      const hash=sha256sim(r.id+(r.reported_at||'')+(r.type||''));
      const blockId='#'+(rows.length-i).toString().padStart(6,'0');
      return `<tr>
        <td style="font-family:monospace;font-size:12px;color:var(--sub)">${blockId}</td>
        <td><a class="rpt-id" href="report.html?id=${r.id}">${r.id}</a></td>
        <td>${typeIcon(r.type)} ${r.type||'—'}</td>
        <td><span class="chip ${statClass(r.status)}">${r.status||'접수'}</span></td>
        <td style="font-family:monospace;font-size:10px;color:var(--sub);max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${hash}">${hash}</td>
        <td><span style="color:var(--primary);font-weight:700;font-size:11px">✓ 검증됨</span></td>
        <td style="font-size:11px">${fmtDate(r.reported_at)}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}
loadOpenhash();

function closeSidebar(){
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('show');
}
document.querySelectorAll('.sb-item').forEach(i=>i.addEventListener('click',()=>{if(window.innerWidth<=768)closeSidebar();}));

</script>
