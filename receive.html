<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>FIIL Receiver</title></head>
<body>
<script>
// fiil.kr/receive.html
// 고팡 앱(gopang.net)에서 postMessage로 전달된 신고 데이터를
// fiil.kr localStorage에 저장하는 중계 페이지.
// 이 페이지는 직접 열지 않으며, 고팡 앱이 숨겨진 iframe으로 로드합니다.

window.addEventListener('message', function(e) {
  // 허용 오리진: gopang.net만
  const allowed = ['https://gopang.net', 'https://www.gopang.net'];
  if (!allowed.includes(e.origin)) return;
  if (!e.data || e.data.type !== 'FIIL_REPORT') return;

  const report = e.data.report;
  if (!report || !report.id) return;

  // localStorage에 저장
  try {
    const stored = localStorage.getItem('fiil_reports');
    const reports = stored ? JSON.parse(stored) : [];

    // 중복 방지
    if (!reports.find(function(r) { return r.id === report.id; })) {
      reports.unshift(report); // 최신이 앞으로
      if (reports.length > 100) reports.pop(); // 최대 100건
      localStorage.setItem('fiil_reports', JSON.stringify(reports));
    }

    // 성공 응답
    if (e.source) {
      e.source.postMessage({ type: 'FIIL_ACK', id: report.id, ok: true }, e.origin);
    }
  } catch(err) {
    if (e.source) {
      e.source.postMessage({ type: 'FIIL_ACK', id: report.id, ok: false, error: err.message }, e.origin);
    }
  }
});
</script>
</body>
</html>
