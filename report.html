<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIIL.kr — 신고 상세 보고서</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* ── 고팡 블루 팔레트 ── */
  --primary:    #305890;
  --primary-dk: #102040;
  --primary-bg: #eaf2fa;
  --primary-mid:#4a72a8;
  --primary-800:#1a3560;
  --primary-700:#214176;
  --primary-600:#284880;
  --primary-300:#7a9cc8;
  --primary-200:#b0c8e0;
  --primary-100:#d0e0f0;

  /* 기능색 — 경고·오류만 예외 */
  --green:      #305890;
  --green-bg:   #eaf2fa;
  --orange:     #b45309;
  --orange-bg:  #fef3c7;
  --red:        #9b1c1c;
  --red-bg:     #fde8e8;

  --surface:#f8f9fc;--bg:#f4f6fa;--sidebar:#305890;
  --border:#b0c8e0;--text:#1a2535;--sub:#4a5e78;--hint:#8a9bb0;
  --shadow-1:0 1px 3px rgba(48,88,144,.12);--r:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(--sidebar);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.sb-brand{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.08);transition:background .15s}.sb-brand:hover{background:rgba(255,255,255,.04)}
.sb-icon{width:32px;height:32px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.sb-name{font-size:14px;font-weight:700}
.sb-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.sb-nav{padding:6px 0;flex:1}
.sb-sec{padding:14px 18px 5px;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:12px;font-weight:500;color:rgba(255,255,255,.65);cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:rgba(0,87,168,.25);color:#fff;border-left-color:var(--primary)}
.sb-user{padding:12px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.5)}
.sb-user strong{display:block;color:#fff;font-size:12px;margin-bottom:1px}

/* ── MAIN ── */
.main{margin-left:220px;min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:2px solid var(--primary);height:52px;display:flex;align-items:center;padding:0 22px;gap:10px;box-shadow:var(--shadow)}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--hint);flex:1}
.breadcrumb a{color:var(--hint)}
.breadcrumb a:hover{color:var(--primary)}
.bc-sep{color:var(--border)}
.topbar-right{display:flex;align-items:center;gap:14px}
.sys-ok{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--primary)}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--primary-800);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.clock{font-size:12px;font-weight:600;color:var(--hint)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:4px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:background .15s}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dk)}

/* ── CONTENT ── */
.content{padding:20px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:12px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.card-body{padding:16px 18px}

/* ── REPORT HEADER ── */
.rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.rh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.rh-id{font-size:18px;font-weight:800;color:var(--primary);letter-spacing:-.3px}
.rh-subtitle{font-size:12px;color:var(--sub);margin-top:3px}
.rh-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding-top:16px;border-top:1px solid var(--border)}
.meta-f{display:flex;flex-direction:column;gap:2px}
.meta-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--hint)}
.meta-v{font-size:12px;font-weight:600;color:var(--text)}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.chip-green {background:var(--primary-bg);color:var(--primary)}
.chip-blue  {background:var(--primary-bg);color:var(--primary)}
.chip-orange{background:var(--orange-bg);color:#4a72a8}
.chip-red   {background:var(--red-bg);color:var(--red)}
.chip-gray  {background:#eaf2fa;color:var(--sub)}

/* ── GRID ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-5-7{display:grid;grid-template-columns:5fr 7fr;gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}

/* ── PHOTO ── */
.photo-box{aspect-ratio:16/10;border-radius:6px;overflow:hidden;background:var(--bg);border:1px solid var(--border);position:relative;display:flex;align-items:center;justify-content:center}
.photo-box img{width:100%;height:100%;object-fit:cover}
.photo-tag{position:absolute;top:8px;right:8px;background:rgba(0,87,168,.85);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.photo-empty{text-align:center;color:var(--hint);font-size:12px}

/* ── MATERIALS TABLE ── */
.mat-table{width:100%;border-collapse:collapse;font-size:12px}
.mat-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);border-bottom:2px solid var(--border);background:var(--bg)}
.mat-table td{padding:9px 10px;border-bottom:2px solid var(--primary);vertical-align:middle}
.mat-table tr:last-child td{border-bottom:none}
.mat-bar{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block}
.mat-fill{height:100%;border-radius:3px;background:var(--primary)}
.disposal-tag{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600}
.d-recycle{background:#eaf2fa;color:#214176}
.d-landfill{background:#f8f9fc;color:#4a5e78}
.d-special {background:#fde8e8;color:#9b1c1c}

/* ── SUBTOTAL CHIPS ── */
.subtotal-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.subtotal-chip{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}

/* ── COST TABLE ── */
.cost-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:2px solid var(--primary);font-size:13px}
.cost-row:last-child{border-bottom:none;font-weight:700;font-size:14px}
.cost-lbl{color:var(--sub)}
.cost-sub{font-size:10px;color:var(--hint);display:block;margin-top:1px}

/* ── COST BOX ── */
.cost-section{background:var(--bg);border-radius:6px;padding:12px 14px;margin-bottom:10px}
.cost-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);margin-bottom:8px}

/* ── TIMELINE ── */
.tl{padding-left:22px;position:relative}
.tl::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:#eaf2fa}
.tl-item{position:relative;margin-bottom:16px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-20px;top:1px;width:14px;height:14px;border-radius:50%;border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-size:8px}
.tl-dot.done{background:var(--primary-800);color:#fff;box-shadow:0 0 0 2px #eaf2fa}
.tl-dot.pend{background:#b0c8e0;box-shadow:0 0 0 2px #eaf2fa}
.tl-time{font-size:10px;color:var(--hint);margin-bottom:1px;font-weight:600}
.tl-desc{font-size:12px;color:var(--text);line-height:1.5}

/* ── WEATHER ── */
.weather-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.wx-item{background:var(--bg);border-radius:6px;padding:10px;text-align:center}
.wx-icon{font-size:20px;margin-bottom:4px}
.wx-val{font-size:13px;font-weight:700}
.wx-lbl{font-size:10px;color:var(--hint);margin-top:1px}

/* ── BLOCKCHAIN ── */
.chain{background:#102040;border-radius:var(--r);padding:16px}
.chain-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(27,107,58,.25);border:1px solid rgba(27,107,58,.4);color:#d0e0f0;padding:4px 10px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:12px}
.chain-row{display:flex;gap:10px;margin-bottom:7px;font-size:11px;font-family:'JetBrains Mono','Courier New',monospace}
.chain-row:last-child{margin-bottom:0}
.chain-k{color:#4a5e78;min-width:110px;flex-shrink:0}
.chain-v{color:#b0c8e0;word-break:break-all}
.chain-hash{color:#7a9cc8}
.chain-ok{color:#d0e0f0}

/* ── GCS BADGE ── */
.gcs-badge{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--primary-bg),#eaf2fa);border:1px solid #d0e0f0;border-radius:var(--r);padding:12px 16px;margin-bottom:16px}
.gcs-icon{font-size:24px}
.gcs-text strong{display:block;font-size:13px;color:var(--primary)}
.gcs-text span{font-size:11px;color:var(--sub)}
.gcs-pts{margin-left:auto;font-size:20px;font-weight:800;color:var(--primary)}

/* ── SUMMARY BOXES ── */
.summary-box{background:var(--primary-bg);border-left:4px solid var(--primary);border-radius:0 6px 6px 0;padding:12px 14px;margin-bottom:10px}
.summary-box.green{background:var(--primary-bg);border-left-color:var(--primary)}
.summary-box-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--primary);margin-bottom:5px}
.summary-box.green .summary-box-lbl{color:var(--primary)}
.summary-box p{font-size:12px;line-height:1.7;color:var(--text)}

/* ── DISPOSAL SITE ── */
.disposal-card{background:var(--bg);border-radius:6px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.disposal-pin{font-size:22px;flex-shrink:0}
.disposal-name{font-size:13px;font-weight:700}
.disposal-meta{font-size:11px;color:var(--sub);margin-top:2px}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{display:none}.main{margin-left:0}
  .grid-2,.grid-3,.grid-5-7{grid-template-columns:1fr}
  .rh-top{flex-direction:column}
}

/* ── 모바일 반응형 ── */
/* hamburger/overlay base: see @media below */

@media(max-width:1100px){
  .stat-grid{grid-template-columns:1fr 1fr !important}
  .row-2,.panel-row{grid-template-columns:1fr !important}
}
.hamburger{display:none}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;width:280px;z-index:400}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0}
  .hamburger{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:none;border:none;cursor:pointer;flex-shrink:0;color:var(--primary,#305890)}
  .content,.wrap{padding:12px}
  .stat-grid{grid-template-columns:1fr 1fr !important;gap:10px;margin-bottom:12px}
  .stat-card{padding:12px 12px}
  .stat-val{font-size:18px}
  .row-2,.row-equal,.panel-row,.kpi-grid{grid-template-columns:1fr !important;gap:10px}
  .card,.panel{margin-bottom:10px}
  .card-head,.panel-head{padding:9px 12px}
  .tbl th,.tbl td,.list-tbl th,.list-tbl td,.fs-tbl th,.fs-tbl td{font-size:11px;padding:7px 10px;white-space:nowrap}
  #mini-map{height:150px !important}
  #kakao-map{height:360px !important}
  .chip{font-size:10px;padding:2px 7px}
}
@media(max-width:400px){
  .stat-grid{grid-template-columns:1fr 1fr !important;gap:8px}
  .content,.wrap{padding:8px}
}
</style>
<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c7160a2d047af2808065d9e1929a66a7&libraries=services">
// ── 모바일 사이드바 ──────────────────────────────────
function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('sidebar-overlay');
  if(!sb)return;
  sb.classList.toggle('open');
  ov&&ov.classList.toggle('show');
}
function closeSidebar(){
  document.querySelector('.sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('show');
}
document.querySelectorAll('.sb-item').forEach(i=>i.addEventListener('click',()=>{if(window.innerWidth<=768)closeSidebar();}));

</script>
</head>

// ── 승인 처리 ─────────────────────────────────────────
async function approveReport() {
  const btn = document.getElementById('approve-btn');
  if (!reportId) return;

  // 이미 승인된 경우 확인
  if (btn.dataset.approved === 'true') {
    alert('이미 승인된 신고입니다.');
    return;
  }

  if (!confirm(`${reportId} 신고를 승인하시겠습니까?\n\n처리 비용의 70%가 비용으로,\n30%가 세전 수입으로 기록됩니다.`)) return;

  btn.disabled = true;
  btn.textContent = '승인 중…';

  try {
    // 현재 신고 데이터 조회 (비용 계산용)
    const res = await fetch(
      SB_URL+'/rest/v1/reports?id=eq.'+encodeURIComponent(reportId)+'&select=analysis,cost&limit=1',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY } }
    );
    const data = await res.json();
    const r = data[0] || {};
    const a = r.analysis || {};

    // 총 비용 산출 (analysis.cost.total_est 또는 cost 컬럼)
    const totalCost =
      a.cost?.total_est ||
      a.gemini?.cost_estimate?.total_est ||
      (r.cost ? (r.cost.labor||0)+(r.cost.equipment||0)+(r.cost.supplies||0) : 0) ||
      0;

    const approvedCost    = Math.round(totalCost * 0.7);
    const incomeBeforeTax = Math.round(totalCost * 0.3);

    // Supabase 업데이트
    const updateRes = await fetch(
      SB_URL+'/rest/v1/reports?id=eq.'+encodeURIComponent(reportId),
      {
        method: 'PATCH',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer '+SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({
          status:             '승인',
          approved_at:        new Date().toISOString(),
          approved_by:        'admin',
          approved_cost:      approvedCost,
          income_before_tax:  incomeBeforeTax,
        }),
      }
    );

    if (!updateRes.ok) throw new Error('업데이트 실패: ' + updateRes.status);

    // UI 업데이트
    btn.textContent  = '✅ 승인됨';
    btn.style.background = '#284880';
    btn.dataset.approved = 'true';

    // 상태 칩 업데이트
    const statEl = document.querySelector('.chip[class*="chip-"]');
    if (statEl) {
      statEl.className = 'chip chip-green';
      statEl.textContent = '승인';
    }

    // 비용 요약 표시
    alert(`승인 완료!\n\n처리 비용: ₩${totalCost.toLocaleString()}\n비용 (70%): ₩${approvedCost.toLocaleString()}\n세전 수입 (30%): ₩${incomeBeforeTax.toLocaleString()}`);

  } catch(e) {
    console.error('[승인 오류]', e);
    alert('승인 처리 중 오류가 발생했습니다: ' + e.message);
    btn.disabled = false;
    btn.textContent = '✅ 승인';
  }
}

      btn.textContent     = '✅ 승인됨';
      btn.style.background = '#284880';
      btn.dataset.approved = 'true';
    }
  }
}

// Init
loadReport().then(r => {
  if (r) {
    render(r);
    _checkApprovalStatus(r);
    // GPS → 카카오 역지오코딩 (Geocoder API — CORS 안전)
    if (r.gps && window.kakao && kakao.maps && kakao.maps.services) {
      const parts = r.gps.replace(/\s/g,'').split(',');
      if (parts.length >= 2) {
        const lat = parseFloat(parts[0]), lng = parseFloat(parts[1]);
        new kakao.maps.services.Geocoder().coord2Address(lng, lat, (result, status) => {
          if (status === kakao.maps.services.Status.OK && result[0]) {
            const addr = result[0].road_address?.address_name
                      || result[0].address?.address_name;
            const el = document.getElementById('gps-display');
            if (addr && el) el.textContent = addr + ' (' + r.gps + ')';
          }
        });
      }
    }
  }
  else {
    document.getElementById('content').innerHTML=`
      <div style="text-align:center;padding:80px 20px">
        <div style="font-size:40px;margin-bottom:12px">🔍</div>
        <h2 style="font-size:16px;margin-bottom:8px">보고서를 찾을 수 없습니다</h2>
        <p style="color:var(--hint);margin-bottom:20px">신고 번호 <strong>${reportId||'(없음)'}</strong></p>
        <button class="btn btn-primary" onclick="history.back()">← 목록으로</button>
      </div>`;
  }
});
</script>
</body>
</html>
