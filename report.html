<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIIL.kr — 신고 상세 보고서</title>
<style>
/* ── Google Fonts (Noto Sans KR) ── */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');

/* ── Design Tokens (fiil.kr 통일) ── */
:root {
  --color-primary:    #1a73e8;   /* Material Blue 600 */
  --color-primary-dk: #1557b0;
  --color-surface:    #ffffff;
  --color-bg:         #f8f9fa;   /* Google/GOV 배경 */
  --color-sidebar:    #1a2332;   /* fiil.kr 사이드바 */
  --color-sidebar-active: rgba(26,115,232,0.18);
  --color-border:     #e0e0e0;   /* Material Divider */
  --color-text:       #202124;
  --color-text-sub:   #5f6368;
  --color-text-hint:  #9aa0a6;

  /* Status */
  --color-green:  #1e8e3e;
  --color-green-bg: #e6f4ea;
  --color-blue-bg:  #e8f0fe;
  --color-orange: #e37400;
  --color-orange-bg: #fef7e0;
  --color-red:    #d93025;
  --color-red-bg: #fce8e6;
  --color-gray-bg: #f1f3f4;

  /* Elevation */
  --shadow-1: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px rgba(60,64,67,.15);
  --shadow-2: 0 1px 3px rgba(60,64,67,.3), 0 4px 8px rgba(60,64,67,.15);
  --radius:   8px;
  --radius-sm: 4px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  font-size: 14px;
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }

/* ══════════════════════════════════
   LAYOUT — Sidebar + Main
══════════════════════════════════ */
.app { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  background: var(--color-sidebar);
  color: #fff;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 200;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.brand-icon {
  width: 36px; height: 36px;
  background: var(--color-primary);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: #fff;
  flex-shrink: 0;
}
.brand-text { line-height: 1.2; }
.brand-name { font-size: 15px; font-weight: 700; }
.brand-sub  { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }

.sidebar-nav { padding: 8px 0; flex: 1; }
.nav-section {
  padding: 16px 20px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: background .15s, color .15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active {
  background: var(--color-sidebar-active);
  color: #fff;
  border-left-color: var(--color-primary);
}
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--color-primary);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
}

.sidebar-user {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
}
.sidebar-user strong { display: block; color: #fff; font-size: 13px; margin-bottom: 2px; }

/* ── Main ── */
.main {
  margin-left: 240px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ── Topbar ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--color-text-sub);
  flex: 1;
}
.breadcrumb a { color: var(--color-text-sub); }
.breadcrumb a:hover { color: var(--color-primary); }
.breadcrumb-sep { color: var(--color-text-hint); }
.breadcrumb-current { color: var(--color-text); font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.sys-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--color-green);
}
.sys-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-green); }
.topbar-clock { font-size: 13px; font-weight: 600; color: var(--color-text-sub); }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: none;
  transition: box-shadow .15s, background .15s;
  white-space: nowrap;
}
.btn:hover { box-shadow: var(--shadow-1); }
.btn-contained {
  background: var(--color-primary);
  color: #fff;
}
.btn-contained:hover { background: var(--color-primary-dk); }
.btn-outlined {
  background: transparent;
  border: 1px solid var(--color-border);
  color: var(--color-text);
}
.btn-outlined:hover { background: var(--color-gray-bg); }
.btn-text {
  background: transparent;
  color: var(--color-primary);
  padding: 7px 8px;
}
.btn-text:hover { background: var(--color-blue-bg); }

/* ── Content area ── */
.content { padding: 24px; max-width: 1280px; }

/* ── Chips / Badges ── */
.chip {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.chip-green  { background: var(--color-green-bg);  color: var(--color-green); }
.chip-blue   { background: var(--color-blue-bg);   color: var(--color-primary); }
.chip-orange { background: var(--color-orange-bg); color: var(--color-orange); }
.chip-red    { background: var(--color-red-bg);    color: var(--color-red); }
.chip-gray   { background: var(--color-gray-bg);   color: var(--color-text-sub); }

/* ── Cards ── */
.card {
  background: var(--color-surface);
  border-radius: var(--radius);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--color-border);
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-text-sub);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-body { padding: 20px; }

/* ── Report Header Card ── */
.report-header-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-1);
  padding: 24px;
  margin-bottom: 20px;
}
.rh-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 20px;
}
.rh-id { font-size: 20px; font-weight: 800; color: var(--color-primary); letter-spacing: -0.3px; }
.rh-subtitle { font-size: 13px; color: var(--color-text-sub); margin-top: 4px; }
.rh-actions { display: flex; gap: 8px; flex-shrink: 0; }
.rh-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  padding-top: 20px;
  border-top: 1px solid var(--color-border);
}
.meta-field { display: flex; flex-direction: column; gap: 3px; }
.meta-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--color-text-hint); }
.meta-value { font-size: 13px; font-weight: 600; color: var(--color-text); }

/* ── Source Banner ── */
.source-banner {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--color-blue-bg);
  border: 1px solid #c2d7f8;
  border-radius: var(--radius);
  padding: 12px 18px;
  margin-bottom: 20px;
}
.source-logo {
  width: 36px; height: 36px;
  background: var(--color-primary);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.source-text { flex: 1; }
.source-title { font-size: 13px; font-weight: 700; color: var(--color-primary); }
.source-sub   { font-size: 11px; color: var(--color-text-sub); margin-top: 1px; }
.source-link  { font-size: 12px; font-weight: 600; color: var(--color-primary); }
.source-link:hover { text-decoration: underline; }

/* ── Grid layouts ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-5-7 { display: grid; grid-template-columns: 5fr 7fr; gap: 20px; margin-bottom: 20px; }

/* ── Photo ── */
.photo-container {
  aspect-ratio: 16/10;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.photo-container img { width: 100%; height: 100%; object-fit: cover; }
.photo-ai-tag {
  position: absolute; top: 10px; right: 10px;
  background: rgba(26,115,232,0.9);
  color: #fff;
  font-size: 11px; font-weight: 700;
  padding: 4px 10px;
  border-radius: 12px;
  backdrop-filter: blur(4px);
}
.photo-placeholder {
  text-align: center;
  color: var(--color-text-hint);
}
.photo-placeholder .ph-icon { font-size: 36px; margin-bottom: 8px; }
.photo-placeholder .ph-text { font-size: 12px; }

/* ── AI Analysis blocks ── */
.ai-section {
  background: #e8f0fe;
  border-left: 3px solid var(--color-primary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 14px 16px;
  margin-bottom: 12px;
}
.ai-section:last-child { margin-bottom: 0; }
.ai-section-label { font-size: 11px; font-weight: 700; color: var(--color-primary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.ai-section p { font-size: 13px; line-height: 1.7; color: var(--color-text); }
.ai-section.green { background: var(--color-green-bg); border-left-color: var(--color-green); }
.ai-section.green .ai-section-label { color: var(--color-green); }

/* ── Material Composition ── */
.mat-item { padding: 10px 0; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: 12px; }
.mat-item:last-child { border-bottom: none; }
.mat-name { font-size: 13px; color: var(--color-text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mat-bar { width: 120px; height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
.mat-fill { height: 100%; background: var(--color-primary); border-radius: 3px; }
.mat-pct { font-size: 12px; font-weight: 700; color: var(--color-primary); width: 32px; text-align: right; flex-shrink: 0; }

/* ── Info rows ── */
.info-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--color-border); gap: 12px; font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-key { color: var(--color-text-sub); min-width: 90px; flex-shrink: 0; }
.info-val { color: var(--color-text); font-weight: 500; }

/* ── Timeline (Material style) ── */
.timeline { position: relative; padding-left: 28px; }
.timeline::before { content:''; position:absolute; left:10px; top:8px; bottom:8px; width:2px; background: var(--color-border); }
.tl-item { position: relative; margin-bottom: 24px; }
.tl-item:last-child { margin-bottom: 0; }
.tl-icon {
  position: absolute;
  left: -28px; top: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  border: 2px solid var(--color-surface);
  box-shadow: 0 0 0 2px var(--color-border);
}
.tl-icon.done    { background: var(--color-green);   color: #fff; box-shadow: 0 0 0 2px #a8d5b5; }
.tl-icon.active  { background: var(--color-primary);  color: #fff; box-shadow: 0 0 0 2px #aac4f0; }
.tl-icon.pending { background: var(--color-gray-bg); color: var(--color-text-hint); }
.tl-time  { font-size: 11px; color: var(--color-text-hint); margin-bottom: 2px; }
.tl-label { font-size: 13px; font-weight: 700; }
.tl-sub   { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }

/* ── Cost Table ── */
.cost-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--color-border); font-size: 13px; }
.cost-row:last-child { border-bottom: none; font-weight: 700; font-size: 14px; }
.cost-label { color: var(--color-text-sub); }
.cost-total { color: var(--color-primary); }

/* ── Blockchain Card ── */
.chain-card {
  background: #1a2332;
  border-radius: var(--radius);
  padding: 20px;
}
.chain-verified {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(30,142,62,0.2);
  border: 1px solid rgba(30,142,62,0.4);
  color: #4caf50;
  padding: 5px 12px;
  border-radius: 12px;
  font-size: 11px; font-weight: 700;
  margin-bottom: 16px;
}
.chain-field { display: flex; gap: 12px; margin-bottom: 10px; font-size: 12px; font-family: 'JetBrains Mono', 'Courier New', monospace; }
.chain-field:last-child { margin-bottom: 0; }
.chain-key  { color: #8899aa; min-width: 110px; flex-shrink: 0; }
.chain-val  { color: #cdd6e0; word-break: break-all; }
.chain-hash { color: #64b5f6; }
.chain-ok   { color: #4caf50; }

/* ── Stat chips (top) ── */
.stat-bar { display: flex; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
.stat-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  box-shadow: var(--shadow-1);
  font-size: 12px;
}
.stat-chip-icon { font-size: 16px; }
.stat-chip-val  { font-size: 14px; font-weight: 700; }
.stat-chip-lbl  { font-size: 11px; color: var(--color-text-sub); }

/* ── Print ── */
@media print {
  .sidebar, .topbar, .rh-actions, .source-link { display: none; }
  .main { margin-left: 0; }
  .content { padding: 0; }
}

/* ── Responsive ── */
@media (max-width: 960px) {
  .sidebar { width: 200px; }
  .main { margin-left: 200px; }
  .grid-2, .grid-3, .grid-5-7 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
}
</style>
</head>

<script>
/* ── Clock ─────────────────────────────── */
(function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  setTimeout(tick, 1000);
})();

/* ── URL param ──────────────────────────── */
const params   = new URLSearchParams(location.search);
const reportId = params.get('id');

/* ── localStorage ───────────────────────── */
function loadReport() {
  if (!reportId) return null;
  const raw = localStorage.getItem('fiil_reports');
  if (raw) {
    const found = JSON.parse(raw).find(r => r.id === reportId);
    if (found) return found;
  }
  return DEMO[reportId] || null;
}

/* ── Demo Data ──────────────────────────── */
const DEMO = {
  'RPT-2026-2847': {
    id: 'RPT-2026-2847',
    type: '🏖️ 해안쓰레기', typeCode: 'TYPE_01',
    location: '협재해수욕장 서편 현무암 암반 지대',
    gps: '33.3963, 126.2396',
    reporter: '010-****-1234',
    reportedAt: '2026-05-23 14:23:08',
    urgency: '보통', status: '출동중',
    imageUrl: null,
    gopangAnalysis: {
      summary: '협재해수욕장 서편 현무암 암반 지대에 해양 부유 쓰레기가 조류에 의해 집적되어 있습니다. 도로 접근이 불가능하여 해상 접근이 필요하며, 폐어망·부표류가 암반 틈새에 고착되어 있습니다.',
      materials: [
        {name:'페트병·플라스틱 용기', pct:45},
        {name:'스티로폼 조각', pct:25},
        {name:'폐어망·부표', pct:18},
        {name:'비닐봉투', pct:8},
        {name:'기타', pct:4},
      ],
      volume: '약 80~120L (추정)',
      hazard: '유해물질 없음 (일반 해양 폐기물)',
      recommendation: '고무보트 + 해양쓰레기팀 2인 이상 투입 권장. 만조 전 오전 수거 시 효율 최대.',
      geminiModel: 'gemini-1.5-flash',
      analyzedAt: '2026-05-23 14:23:15',
    },
    dispatch: {team:'해양환경팀 A', vehicle:'고무보트 1척', personnel:3, dispatchedAt:'2026-05-23 14:31:00'},
    cost: {labor:90000, equipment:25000, supplies:5000, other:0},
    blockchain: {
      txHash:'0xa3f8c2d91e4b7f6a2c8d1e3f9a4b7c2d8e1f3a9b4c7d2e8f1a3c9e4b7d2f8a1',
      blockHeight:8241993,
      imageHash:'sha256:a3f8c2...d91e',
      network:'Openhash Network',
    },
  },
};

/* ── Render ─────────────────────────────── */
function render(r) {
  document.getElementById('bc-id').textContent = r.id;
  document.title = r.id + ' — FIIL.kr';

  const urgClass  = {긴급:'chip-red',높음:'chip-orange',보통:'chip-blue',낮음:'chip-gray'}[r.urgency]||'chip-gray';
  const statClass = {완료:'chip-green',출동중:'chip-blue',대기중:'chip-orange',접수:'chip-gray'}[r.status]||'chip-gray';

  const ga      = r.gopangAnalysis;
  const total   = (r.cost.labor||0)+(r.cost.equipment||0)+(r.cost.supplies||0)+(r.cost.other||0);

  const matHTML = ga.materials.map(m=>`
    <div class="mat-item">
      <span class="mat-name">${m.name}</span>
      <div class="mat-bar"><div class="mat-fill" style="width:${m.pct}%"></div></div>
      <span class="mat-pct">${m.pct}%</span>
    </div>`).join('');

  const photo = r.imageUrl
    ? `<img src="${r.imageUrl}" alt="신고 사진"><div class="photo-ai-tag">AI 분석 완료</div>`
    : `<div class="photo-placeholder"><div class="ph-icon">📸</div><div class="ph-text">첨부 사진 없음</div></div>
       <div class="photo-ai-tag">텍스트 분석</div>`;

  document.getElementById('content').innerHTML = `

  <!-- Source Banner -->
  <div class="source-banner">
    <div class="source-logo">🤖</div>
    <div class="source-text">
      <div class="source-title">고팡 AI 분석 보고서 — K-Cleaner 모드</div>
      <div class="source-sub">gopang.net · ${ga.geminiModel} Vision 분석 · ${ga.analyzedAt}</div>
    </div>
    <a class="source-link" href="https://gopang.net" target="_blank">gopang.net →</a>
  </div>

  <!-- Report Header -->
  <div class="report-header-card">
    <div class="rh-top">
      <div>
        <div class="rh-id">${r.id}</div>
        <div class="rh-subtitle">${r.type} &nbsp;·&nbsp; ${r.location}</div>
      </div>
      <div class="rh-actions">
        <button class="btn btn-outlined" onclick="window.print()">🖨 인쇄</button>
        <button class="btn btn-contained" onclick="copyHash()">⛓ 해시 복사</button>
      </div>
    </div>
    <div class="rh-meta">
      <div class="meta-field"><span class="meta-label">신고 일시</span><span class="meta-value">${r.reportedAt}</span></div>
      <div class="meta-field"><span class="meta-label">GPS 좌표</span><span class="meta-value">${r.gps}</span></div>
      <div class="meta-field"><span class="meta-label">신고자</span><span class="meta-value">${r.reporter}</span></div>
      <div class="meta-field"><span class="meta-label">긴급도</span><span class="chip ${urgClass}">${r.urgency}</span></div>
      <div class="meta-field"><span class="meta-label">처리 상태</span><span class="chip ${statClass}">${r.status}</span></div>
      <div class="meta-field"><span class="meta-label">유형 코드</span><span class="meta-value">${r.typeCode}</span></div>
    </div>
  </div>

  <!-- Row 1: Photo + AI Summary -->
  <div class="grid-5-7">
    <div class="card">
      <div class="card-header"><div class="card-title">📸 신고 사진</div></div>
      <div class="card-body" style="padding:12px">
        <div class="photo-container">${photo}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">🤖 AI 종합 분석</div></div>
      <div class="card-body">
        <div class="ai-section">
          <div class="ai-section-label">현장 상황 요약</div>
          <p>${ga.summary}</p>
        </div>
        <div class="ai-section green">
          <div class="ai-section-label">권고 대응 방안</div>
          <p>${ga.recommendation}</p>
        </div>
        <div style="display:flex;gap:24px;margin-top:4px">
          <div class="meta-field"><span class="meta-label">추정 부피</span><span class="meta-value">${ga.volume}</span></div>
          <div class="meta-field"><span class="meta-label">유해 여부</span><span class="meta-value">${ga.hazard}</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 2: Materials + Timeline -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><div class="card-title">🗑 폐기물 성분 분석</div></div>
      <div class="card-body" style="padding:8px 20px">${matHTML}</div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">⏱ 처리 진행 현황</div></div>
      <div class="card-body">
        <div class="timeline">
          <div class="tl-item">
            <div class="tl-icon done">✓</div>
            <div class="tl-time">${r.reportedAt}</div>
            <div class="tl-label">신고 접수</div>
            <div class="tl-sub">고팡 AI 분석 완료 · Openhash 기록</div>
          </div>
          <div class="tl-item">
            <div class="tl-icon done">✓</div>
            <div class="tl-time">${ga.analyzedAt}</div>
            <div class="tl-label">AI 분류 완료</div>
            <div class="tl-sub">${r.typeCode} · ${ga.geminiModel}</div>
          </div>
          ${r.dispatch ? `
          <div class="tl-item">
            <div class="tl-icon ${r.status==='완료'?'done':'active'}">${r.status==='완료'?'✓':'▶'}</div>
            <div class="tl-time">${r.dispatch.dispatchedAt}</div>
            <div class="tl-label">출동 배정</div>
            <div class="tl-sub">${r.dispatch.team} · ${r.dispatch.vehicle} · ${r.dispatch.personnel}명</div>
          </div>` : ''}
          <div class="tl-item">
            <div class="tl-icon ${r.status==='완료'?'done':'pending'}">${r.status==='완료'?'✓':'·'}</div>
            <div class="tl-time">${r.status==='완료'?'완료':'진행 중'}</div>
            <div class="tl-label">조치 완료</div>
            <div class="tl-sub">${r.status==='완료'?'완료 보고서 자동 생성':'출동 중 — 완료 시 자동 기록'}</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 3: Cost + Blockchain -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><div class="card-title">💰 비용 내역</div></div>
      <div class="card-body">
        <div class="cost-row"><span class="cost-label">인건비</span><span>₩${r.cost.labor.toLocaleString()}</span></div>
        <div class="cost-row"><span class="cost-label">장비 · 차량</span><span>₩${r.cost.equipment.toLocaleString()}</span></div>
        <div class="cost-row"><span class="cost-label">소모품</span><span>₩${r.cost.supplies.toLocaleString()}</span></div>
        <div class="cost-row"><span class="cost-label">기타</span><span>₩${r.cost.other.toLocaleString()}</span></div>
        <div class="cost-row cost-total"><span class="cost-label" style="color:var(--color-text);font-weight:700">합계</span><span style="color:var(--color-primary)">₩${total.toLocaleString()}</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">⛓ Openhash 블록체인 기록</div></div>
      <div class="card-body" style="padding:12px">
        <div class="chain-card">
          <div class="chain-verified">● 위변조 불가 기록 완료 · ${r.blockchain.network}</div>
          <div class="chain-field"><span class="chain-key">TX Hash</span><span class="chain-val chain-hash" id="txhash">${r.blockchain.txHash}</span></div>
          <div class="chain-field"><span class="chain-key">블록 높이</span><span class="chain-val">#${r.blockchain.blockHeight.toLocaleString()}</span></div>
          <div class="chain-field"><span class="chain-key">이미지 해시</span><span class="chain-val">${r.blockchain.imageHash}</span></div>
          <div class="chain-field"><span class="chain-key">신고 ID</span><span class="chain-val">${r.id}</span></div>
          <div class="chain-field"><span class="chain-key">상태</span><span class="chain-val chain-ok">검증 완료</span></div>
        </div>
      </div>
    </div>
  </div>

  `;
}

function copyHash() {
  const el = document.getElementById('txhash');
  if (el) navigator.clipboard.writeText(el.textContent)
    .then(() => alert('블록체인 해시가 클립보드에 복사되었습니다.'));
}

/* ── Init ───────────────────────────────── */
const report = loadReport();
if (report) {
  render(report);
} else {
  document.getElementById('content').innerHTML = `
    <div style="text-align:center;padding:80px 20px">
      <div style="font-size:40px;margin-bottom:16px">🔍</div>
      <h2 style="font-size:18px;margin-bottom:8px">보고서를 찾을 수 없습니다</h2>
      <p style="color:var(--color-text-sub);margin-bottom:24px">신고 번호 <strong>${reportId||'(없음)'}</strong>에 해당하는 데이터가 없습니다.</p>
      <button class="btn btn-contained" onclick="history.back()">← 목록으로</button>
    </div>`;
}
</script>
</body>
</html>
